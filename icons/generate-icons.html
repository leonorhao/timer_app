<!DOCTYPE html>
<html>
<head>
    <title>Generate App Icons</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        canvas { border: 1px solid #ccc; margin: 10px; }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>App Icon Generator</h1>
    <p>Click the buttons below to download the icons, then save them in the icons folder.</p>

    <div>
        <h3>192x192 Icon</h3>
        <canvas id="icon192" width="192" height="192"></canvas>
        <br>
        <button onclick="download('icon192', 'icon-192.png')">Download icon-192.png</button>
    </div>

    <div>
        <h3>512x512 Icon</h3>
        <canvas id="icon512" width="512" height="512"></canvas>
        <br>
        <button onclick="download('icon512', 'icon-512.png')">Download icon-512.png</button>
    </div>

    <script>
        function drawIcon(canvas) {
            const ctx = canvas.getContext('2d');
            const size = canvas.width;
            const center = size / 2;
            const radius = size * 0.4;

            // Background
            ctx.fillStyle = '#4A90D9';
            ctx.fillRect(0, 0, size, size);

            // Circle background
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(center, center, radius, 0, Math.PI * 2);
            ctx.fill();

            // Clock face
            ctx.strokeStyle = '#4A90D9';
            ctx.lineWidth = size * 0.02;
            ctx.beginPath();
            ctx.arc(center, center, radius * 0.85, 0, Math.PI * 2);
            ctx.stroke();

            // Hour hand
            ctx.strokeStyle = '#2C3E50';
            ctx.lineWidth = size * 0.04;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(center, center);
            ctx.lineTo(center - radius * 0.3, center - radius * 0.3);
            ctx.stroke();

            // Minute hand
            ctx.lineWidth = size * 0.025;
            ctx.beginPath();
            ctx.moveTo(center, center);
            ctx.lineTo(center + radius * 0.1, center - radius * 0.5);
            ctx.stroke();

            // Center dot
            ctx.fillStyle = '#FF6B6B';
            ctx.beginPath();
            ctx.arc(center, center, size * 0.04, 0, Math.PI * 2);
            ctx.fill();
        }

        function download(canvasId, filename) {
            const canvas = document.getElementById(canvasId);
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // Draw icons on load
        drawIcon(document.getElementById('icon192'));
        drawIcon(document.getElementById('icon512'));
    </script>
</body>
</html>
