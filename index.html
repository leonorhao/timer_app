<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Still Me">

    <title>Still Me</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <h1>Still <span class="header-accent">Me</span></h1>
            <div class="header-tagline">Tiny moments, still yours</div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Timer Screen -->
            <section id="timer-screen" class="screen active">
                <!-- Daily Summary -->
                <div class="daily-summary" id="daily-summary">
                    <div class="summary-header">
                        <span class="summary-title">Today's Progress</span>
                        <span class="summary-total" id="daily-total">0h 0m</span>
                    </div>
                    <div class="summary-bars" id="summary-bars">
                        <!-- Progress bars rendered by JS -->
                    </div>
                    <div class="streak-badge" id="streak-badge" style="display: none;">
                        🔥 <span id="streak-count">0</span> day streak!
                    </div>
                </div>

                <div class="section-title">
                    Start Activity
                    <button class="goals-btn" id="goals-btn">🎯 Goals</button>
                </div>

                <div class="activity-grid" id="activity-buttons">
                    <!-- Activity buttons rendered by JS -->
                </div>

                <div class="section-title">Active Timers</div>
                <div class="active-timers" id="active-timers">
                    <div class="empty-state" id="no-timers">
                        No active timers. Tap an activity to start tracking.
                    </div>
                </div>
            </section>

            <!-- History Screen -->
            <section id="history-screen" class="screen">
                <div class="calendar-container" id="calendar-container">
                    <div class="calendar-header">
                        <button class="calendar-nav" id="cal-prev">&lt;</button>
                        <span class="calendar-month" id="cal-month-label"></span>
                        <button class="calendar-nav" id="cal-next">&gt;</button>
                    </div>
                    <div class="calendar-weekdays">
                        <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
                    </div>
                    <div class="calendar-grid" id="cal-grid"></div>
                </div>
                <div class="section-title">
                    <span id="history-title">Session History</span>
                    <button class="goals-btn" id="show-all-history" style="display:none;">Show All</button>
                </div>
                <div id="history-list" class="history-list">
                    <div class="empty-state">No sessions recorded yet.</div>
                </div>
            </section>

            <!-- Analytics Screen -->
            <section id="analytics-screen" class="screen">
                <div class="analytics-tabs">
                    <button class="tab-btn active" data-period="today">Today</button>
                    <button class="tab-btn" data-period="week">Week</button>
                    <button class="tab-btn" data-period="month">Month</button>
                </div>

                <div class="analytics-summary" id="analytics-summary">
                    <!-- Summary cards rendered by JS -->
                </div>

                <div class="chart-container">
                    <canvas id="analytics-chart"></canvas>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-screen="timer-screen">
                <span class="nav-icon">⏱️</span>
                <span class="nav-label">Timer</span>
            </button>
            <button class="nav-btn" data-screen="history-screen">
                <span class="nav-icon">📋</span>
                <span class="nav-label">History</span>
            </button>
            <button class="nav-btn" data-screen="analytics-screen">
                <span class="nav-icon">📊</span>
                <span class="nav-label">Analytics</span>
            </button>
        </nav>

        <!-- Notes Modal -->
        <div class="modal" id="notes-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Session Notes</h3>
                    <button class="modal-close" id="close-notes">&times;</button>
                </div>
                <textarea id="notes-input" placeholder="Add notes about this session..."></textarea>
                <button class="btn-primary" id="save-notes">Save Notes</button>
            </div>
        </div>

        <!-- Workout Submenu Modal -->
        <div class="modal" id="workout-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Select Workout Type</h3>
                    <button class="modal-close" id="close-workout">&times;</button>
                </div>
                <div class="workout-options" id="workout-options">
                    <!-- Workout options rendered by JS -->
                </div>
            </div>
        </div>

        <!-- Edit History Modal -->
        <div class="modal" id="edit-history-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Edit Session</h3>
                    <button class="modal-close" id="close-edit-history">&times;</button>
                </div>
                <div class="edit-history-form">
                    <div class="edit-field">
                        <label class="edit-label">Notes</label>
                        <textarea id="edit-history-notes" placeholder="Session notes..."></textarea>
                    </div>
                    <div class="edit-field">
                        <label class="edit-label">Duration (minutes)</label>
                        <input type="number" id="edit-history-duration" min="1" max="1440" class="edit-input">
                    </div>
                </div>
                <button class="btn-primary" id="save-edit-history">Save Changes</button>
                <button class="btn-danger" id="delete-history-session">Delete Session</button>
            </div>
        </div>

        <!-- Add Activity Modal -->
        <div class="modal" id="add-activity-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>New Activity</h3>
                    <button class="modal-close" id="close-add-activity">&times;</button>
                </div>
                <div class="edit-history-form">
                    <div class="edit-field">
                        <label class="edit-label">Name</label>
                        <input type="text" id="new-activity-name" class="edit-input" placeholder="e.g. Reading" maxlength="20">
                    </div>
                    <div class="edit-field">
                        <label class="edit-label">Emoji</label>
                        <input type="text" id="new-activity-icon" class="edit-input" placeholder="e.g. 📖" maxlength="2">
                    </div>
                    <div class="edit-field">
                        <label class="edit-label">Color</label>
                        <input type="color" id="new-activity-color" class="edit-input" value="#9B59B6">
                    </div>
                </div>
                <button class="btn-primary" id="save-new-activity">Add Activity</button>
            </div>
        </div>

        <!-- Goals Modal -->
        <div class="modal" id="goals-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Daily Goals</h3>
                    <button class="modal-close" id="close-goals">&times;</button>
                </div>
                <div class="goals-list" id="goals-list">
                    <!-- Goals rendered by JS -->
                </div>
                <button class="btn-primary" id="save-goals">Save Goals</button>
            </div>
        </div>
    </div>

    <!-- External Libraries -->
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <!-- App Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
